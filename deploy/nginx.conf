# /etc/nginx/sites-available/birds.gaylon.photos
# Reverse proxy birds.gaylon.photos -> 127.0.0.1:3003 (PM2/SvelteKit).
# Cloudflare in front, zone TLS mode Flexible, origin is HTTP-only on :80.
# Matches the sibling apps (gaylonphotos, giftlist, madonnahist) on this droplet.

server {
    listen 80;
    listen [::]:80;
    server_name birds.gaylon.photos;

    # No uploads in this app (link-out gallery; CSV imports are tiny).
    client_max_body_size 5m;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    access_log /var/log/nginx/birds.access.log;
    error_log  /var/log/nginx/birds.error.log;

    # Cloudflare terminates TLS (zone mode = Flexible) and speaks HTTP to this
    # origin, so $scheme is ALWAYS "http" here and can't tell us the visitor's
    # real scheme. Cloudflare passes that in the CF-Visitor request header.
    # Force HTTPS: if the browser arrived over http, 301 it to https.
    #
    # Why this matters: a device that lands on http://birds.gaylon.photos (e.g. a
    # PWA re-added from a bare URL -- start_url is "/", so it inherits the install
    # scheme) shows "not secure" AND fails login with SvelteKit's CSRF guard
    # ("cross-site POST form submissions are forbidden"), because the http page's
    # Origin header doesn't match the app's https origin. `if`+`return` is one of
    # the few nginx-safe uses of `if`.
    if ($http_cf_visitor ~ '"scheme":"http"') {
        return 301 https://$host$request_uri;
    }

    # Once seen over https, browsers upgrade http->https on their own.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Service worker must never be edge/browser-cached, or SW updates (and fixes)
    # can't propagate. Cloudflare honors no-store and won't cache it.
    location = /service-worker.js {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
