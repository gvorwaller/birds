# /etc/nginx/sites-available/birds.gaylon.photos
# Reverse proxy birds.gaylon.photos -> 127.0.0.1:3003 (PM2/SvelteKit).
# Cloudflare in front, zone TLS mode Flexible, origin is HTTP-only on :80.
# Matches the sibling apps (gaylonphotos, giftlist, madonnahist) on this droplet.

server {
    listen 80;
    listen [::]:80;
    server_name birds.gaylon.photos;

    # No uploads in this app (link-out gallery; CSV imports are tiny).
    client_max_body_size 5m;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    access_log /var/log/nginx/birds.access.log;
    error_log  /var/log/nginx/birds.error.log;

    # HTTP->HTTPS is handled zone-wide by Cloudflare "Always Use HTTPS" (edge
    # redirect), same as the sibling apps -- no per-app redirect/HSTS here.

    # Service worker must never be edge/browser-cached, or SW updates (and fixes)
    # can't propagate. Cloudflare honors no-store and won't cache it.
    location = /service-worker.js {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
